name: CI Build NTK on Push TAG
on:
  workflow_call:
    inputs:
      runner_labels:
        required: false
        type: string
      test_mode:
        required: false
        type: string
        default: "integration"   # one of: unit | integration | both
  workflow_dispatch:
    inputs:
      test_mode:
        required: false
        type: choice
        default: "integration"
        options:
          - integration
          - unit
          - both

env:
  #DATABASE CONFIG
  DATABASE_DIALECT: postgres
  # Integration DBs run as host-published containers, reached on localhost.
  DATABASE_HOST: 127.0.0.1
  DATABASE_PORT: 5432
  DATABASE_USERNAME: postgres
  DATABASE_PASSWORD: password
  DATABASE_NAME: db_name

jobs:
  delete-tag:
    name: Delete Trigger Tag
    runs-on: ${{ inputs.runner_labels || 'self-hosted' }}
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - name: Delete Tag
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              core.info(`Deleted tag ${tag}`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                core.warning(`Tag ${tag} not found, skipping deletion.`);
              } else {
                throw error;
              }
            }

  unit-tests:
    name: Unit Tests
    runs-on: ${{ inputs.runner_labels || 'self-hosted' }}
    if: ${{ contains(fromJSON('["unit","both"]'), inputs.test_mode || 'integration') }}
    outputs:
      END_STEP_JOB_ID: ${{ steps.end_step.outputs.END_STEP_JOB_ID }}
      REPORT: ${{ steps.report.outputs.artifact-url }}
    steps:
      - name: Checkout
        # Check out the commit SHA, not the trigger tag: the parallel delete-tag job
        # removes refs/tags/<tag>, so a tag-based checkout would race and fail.
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: 💿 Setup NODEJS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: ▶️ Get Env From Example
        run: |
          sed '/^#/d' .env.example > .env
          # Forward only well-formed KEY=value lines: .env.example may contain bare keys
          # (e.g. MESSAGE_EXTERNAL_SOURCE_LAST_ID) that are invalid for $GITHUB_ENV.
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env >> "$GITHUB_ENV" || true

      - name: ⏬ Install Dependencies
        env:
          NODE_ENV: development
        run: |
          npm pkg delete scripts.prepare
          npm ci

      - name: 🧪 Run Unit Tests
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          LOG_LEVEL: "error"
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee results.txt

      - name: Save Artifact
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        id: report
        with:
          name: unit-test-report
          path: ./results.txt
          retention-days: 30

      - name: End Step On Failure
        if: failure()
        id: end_step
        run: echo "END_STEP_JOB_ID=`echo ${{ github.run_id }}`" | tee -a $GITHUB_OUTPUT

  integration-tests:
    name: Integration Tests
    runs-on: ${{ inputs.runner_labels || 'self-hosted' }}
    if: ${{ contains(fromJSON('["integration","both"]'), inputs.test_mode || 'integration') }}
    outputs:
      END_STEP_JOB_ID: ${{ steps.end_step.outputs.END_STEP_JOB_ID }}
      REPORT: ${{ steps.report.outputs.artifact-url }}
    steps:
      - name: Checkout
        # Check out the commit SHA, not the trigger tag: the parallel delete-tag job
        # removes refs/tags/<tag>, so a tag-based checkout would race and fail.
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      # GitHub `services:` start before any step, so they require Docker pre-installed on
      # the runner image (which the self-hosted image lacks). Instead install Docker here
      # and run Postgres + Redis manually with host port mapping, so DATABASE_HOST /
      # REDIS_HOST (127.0.0.1 / localhost) reach the published ports.
      - name: 🐳 Ensure Docker
        uses: novaitdevteam/nova.ci/.github/actions/install-docker@main

      - name: 🐘 Start Postgres + Redis
        env:
          # novatalks.core mirrors the production PG major version (PG 17.9); others use postgres:16.
          PG_IMAGE: ${{ github.event.repository.name == 'novatalks.core' && 'postgres:17.9-trixie' || 'postgres:16' }}
        run: |
          set -euo pipefail
          docker rm -f nova-pg nova-redis >/dev/null 2>&1 || true
          docker run -d --name nova-pg \
            -e POSTGRES_PASSWORD="$DATABASE_PASSWORD" \
            -e POSTGRES_DB="$DATABASE_NAME" \
            -e POSTGRES_USER="$DATABASE_USERNAME" \
            -p 5432:5432 "$PG_IMAGE"
          docker run -d --name nova-redis -p 6379:6379 redis:8

          echo "Waiting for Postgres..."
          for _ in $(seq 1 30); do
            docker exec nova-pg pg_isready -U "$DATABASE_USERNAME" -d "$DATABASE_NAME" >/dev/null 2>&1 && break
            sleep 2
          done
          docker exec nova-pg pg_isready -U "$DATABASE_USERNAME" -d "$DATABASE_NAME"

          echo "Waiting for Redis..."
          for _ in $(seq 1 15); do
            [ "$(docker exec nova-redis redis-cli ping 2>/dev/null)" = "PONG" ] && break
            sleep 1
          done
          docker exec nova-redis redis-cli ping

      - name: 💿 Setup NODEJS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: ▶️ Get Env From Example
        run: |
          sed '/^#/d' .env.example > .env
          # Forward only well-formed KEY=value lines: .env.example may contain bare keys
          # (e.g. MESSAGE_EXTERNAL_SOURCE_LAST_ID) that are invalid for $GITHUB_ENV.
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env >> "$GITHUB_ENV" || true

      - name: ⏬ Install Dependencies
        env:
          NODE_ENV: development
        run: |
          npm pkg delete scripts.prepare
          npm ci

      - name: Enable pgcrypto extension
        run: |
          docker exec -e PGPASSWORD="$DATABASE_PASSWORD" nova-pg \
            psql -h 127.0.0.1 -U "$DATABASE_USERNAME" -d "$DATABASE_NAME" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      # Integration sharding (jest --shard with a matrix) is intentionally NOT enabled by
      # default because integration tests share DB state and run with --runInBand.
      # To parallelize, give each shard its own postgres/redis service and split with --shard=i/N.
      - name: 🏃 Run Integration Tests
        env:
          NODE_ENV: production
          NODE_OPTIONS: "--max-old-space-size=8192"
          LOG_LEVEL: "error"
          UV_THREADPOOL_SIZE: "32"
          FORCE_COLOR: "false"
          NO_COLOR: "true"
          DATABASE_LOGGING: "false"
        run: |
          set -o pipefail
          npm run test:integration 2>&1 | tee results.txt

      - name: Save Artifact
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        id: report
        with:
          name: integration-test-report
          path: ./results.txt
          retention-days: 30

      - name: End Step On Failure
        if: failure()
        id: end_step
        run: echo "END_STEP_JOB_ID=`echo ${{ github.run_id }}`" | tee -a $GITHUB_OUTPUT

      - name: 🧹 Tear down containers
        if: always()
        run: docker rm -f nova-pg nova-redis >/dev/null 2>&1 || true

  notify-telegram:
    name: Notifier
    runs-on: ${{ inputs.runner_labels || 'self-hosted' }}
    if: always()
    needs: [unit-tests, integration-tests]
    steps:
      - name: Set Telegram Message
        uses: novaitdevteam/nova.ci/.github/actions/action-cond@main
        id: telegram_message
        with:
          cond: ${{ !contains(join(needs.*.result, ','), 'failure') }}
          if_true: |
            👷 ${{ github.actor }} start test

            Test run (${{ inputs.test_mode || 'integration' }}) completed ✅

            Repository: ${{ github.repository }}
            ▶️ Unit Report: ${{ needs.unit-tests.outputs.REPORT }}
            ▶️ Integration Report: ${{ needs.integration-tests.outputs.REPORT }}

          if_false: |
            👷 ${{ github.actor }} start test

            ❌Tests Failed

            🔗 See Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ needs.integration-tests.outputs.END_STEP_JOB_ID || needs.unit-tests.outputs.END_STEP_JOB_ID}}
            Repository: ${{ github.repository }}

      - name: Send to Telegram
        uses: actions/github-script@v8
        env:
          TELEGRAM_TO: ${{ secrets.TG_NOTIFICATION_BOT_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TG_NOTIFICATION_BOT_TOKEN }}
          TELEGRAM_MESSAGE: ${{ steps.telegram_message.outputs.value }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const params = new URLSearchParams({
              chat_id: process.env.TELEGRAM_TO,
              text: process.env.TELEGRAM_MESSAGE,
            });
            const response = await fetch(`https://api.telegram.org/bot${process.env.TELEGRAM_TOKEN}/sendMessage`, {
              method: "POST",
              headers: {"Content-Type": "application/x-www-form-urlencoded"},
              body: params,
            });
            if (!response.ok) {
              throw new Error(`Telegram sendMessage failed: ${response.status} ${await response.text()}`);
            }

      - name: Send Message To GChat
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          debug: "true"
          script: |
            async function webhook() {
              const url = "${{ secrets.GC_NOTIFICATION_WEBHOOK }}"
              const res = await fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json; charset=UTF-8"},
                body: JSON.stringify({text: `${{ steps.telegram_message.outputs.value }}`})
              });
              return await res.json();
            }

            webhook();
