name: CI Build NTK on Push TAG
on:
  workflow_call:
    inputs:
      runner_labels:
        required: false
        type: string
      test_mode:
        required: false
        type: string
        default: "integration"   # one of: unit | integration | both
  workflow_dispatch:
    inputs:
      test_mode:
        required: false
        type: choice
        default: "integration"
        options:
          - integration
          - unit
          - both

env:
  #DATABASE CONFIG
  DATABASE_DIALECT: postgres
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_USERNAME: postgres
  DATABASE_PASSWORD: password
  DATABASE_NAME: db_name

jobs:
  delete-tag:
    name: Delete Trigger Tag
    runs-on: ${{ inputs.runner_labels || 'self-hosted' }}
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - name: Delete Tag
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              core.info(`Deleted tag ${tag}`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                core.warning(`Tag ${tag} not found, skipping deletion.`);
              } else {
                throw error;
              }
            }

  unit-tests:
    name: Unit Tests
    runs-on: ${{ inputs.runner_labels || 'self-hosted' }}
    if: ${{ contains(fromJSON('["unit","both"]'), inputs.test_mode || 'integration') }}
    outputs:
      END_STEP_JOB_ID: ${{ steps.end_step.outputs.END_STEP_JOB_ID }}
      REPORT: ${{ steps.report.outputs.artifact-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 💿 Setup NODEJS
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: ▶️ Get Env From Example
        run: |
          sed '/^#/d' .env.example > .env
          cat .env >> $GITHUB_ENV

      - name: ⏬ Install Dependencies
        env:
          NODE_ENV: development
        run: |
          npm pkg delete scripts.prepare
          npm ci

      - name: 🧪 Run Unit Tests
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          LOG_LEVEL: "error"
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee results.txt

      - name: Save Artifact
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        id: report
        with:
          name: unit-test-report
          path: ./results.txt
          retention-days: 30

      - name: End Step On Failure
        if: failure()
        id: end_step
        run: echo "END_STEP_JOB_ID=`echo ${{ github.run_id }}`" | tee -a $GITHUB_OUTPUT

  integration-tests:
    name: Integration Tests
    runs-on: ${{ inputs.runner_labels || 'self-hosted' }}
    if: ${{ contains(fromJSON('["integration","both"]'), inputs.test_mode || 'integration') }}
    services:
      postgres:
        # novatalks.core mirrors the production PG major version with the official PG 17.9
        # image; other repos (e.g. novatalks.engine) keep the stock postgres:16.
        image: ${{ github.event.repository.name == 'novatalks.core' && 'postgres:17.9-trixie' || 'postgres:16' }}
        env:
          POSTGRES_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ env.DATABASE_NAME }}
          POSTGRES_USER: ${{ env.DATABASE_USERNAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    outputs:
      END_STEP_JOB_ID: ${{ steps.end_step.outputs.END_STEP_JOB_ID }}
      REPORT: ${{ steps.report.outputs.artifact-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 💿 Setup NODEJS
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: ▶️ Get Env From Example
        run: |
          sed '/^#/d' .env.example > .env
          cat .env >> $GITHUB_ENV

      - name: ⏬ Install Dependencies
        env:
          NODE_ENV: development
        run: |
          npm pkg delete scripts.prepare
          npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Enable pgcrypto extension
        run: |
          psql -h $DATABASE_HOST -U $DATABASE_USERNAME -d $DATABASE_NAME -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
        env:
          PGPASSWORD: ${{ env.DATABASE_PASSWORD }}

      # Integration sharding (jest --shard with a matrix) is intentionally NOT enabled by
      # default because integration tests share DB state and run with --runInBand.
      # To parallelize, give each shard its own postgres/redis service and split with --shard=i/N.
      - name: 🏃 Run Integration Tests
        env:
          NODE_ENV: production
          NODE_OPTIONS: "--max-old-space-size=8192"
          LOG_LEVEL: "error"
          UV_THREADPOOL_SIZE: "32"
          FORCE_COLOR: "false"
          NO_COLOR: "true"
          DATABASE_LOGGING: "false"
        run: |
          set -o pipefail
          npm run test:integration 2>&1 | tee results.txt

      - name: Save Artifact
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        id: report
        with:
          name: integration-test-report
          path: ./results.txt
          retention-days: 30

      - name: End Step On Failure
        if: failure()
        id: end_step
        run: echo "END_STEP_JOB_ID=`echo ${{ github.run_id }}`" | tee -a $GITHUB_OUTPUT

  notify-telegram:
    name: Notifier
    runs-on: ${{ inputs.runner_labels || 'self-hosted' }}
    if: always()
    needs: [unit-tests, integration-tests]
    steps:
      - name: Set Telegram Message
        uses: novaitdevteam/nova.ci/.github/actions/action-cond@main
        id: telegram_message
        with:
          cond: ${{ !contains(join(needs.*.result, ','), 'failure') }}
          if_true: |
            👷 ${{ github.actor }} start test

            Test run (${{ inputs.test_mode || 'integration' }}) completed ✅

            Repository: ${{ github.repository }}
            ▶️ Unit Report: ${{ needs.unit-tests.outputs.REPORT }}
            ▶️ Integration Report: ${{ needs.integration-tests.outputs.REPORT }}

          if_false: |
            👷 ${{ github.actor }} start test

            ❌Tests Failed

            🔗 See Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ needs.integration-tests.outputs.END_STEP_JOB_ID || needs.unit-tests.outputs.END_STEP_JOB_ID}}
            Repository: ${{ github.repository }}

      - name: Send to Telegram
        uses: actions/github-script@v8
        env:
          TELEGRAM_TO: ${{ secrets.TG_NOTIFICATION_BOT_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TG_NOTIFICATION_BOT_TOKEN }}
          TELEGRAM_MESSAGE: ${{ steps.telegram_message.outputs.value }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const params = new URLSearchParams({
              chat_id: process.env.TELEGRAM_TO,
              text: process.env.TELEGRAM_MESSAGE,
            });
            const response = await fetch(`https://api.telegram.org/bot${process.env.TELEGRAM_TOKEN}/sendMessage`, {
              method: "POST",
              headers: {"Content-Type": "application/x-www-form-urlencoded"},
              body: params,
            });
            if (!response.ok) {
              throw new Error(`Telegram sendMessage failed: ${response.status} ${await response.text()}`);
            }

      - name: Send Message To GChat
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          debug: "true"
          script: |
            async function webhook() {
              const url = "${{ secrets.GC_NOTIFICATION_WEBHOOK }}"
              const res = await fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json; charset=UTF-8"},
                body: JSON.stringify({text: `${{ steps.telegram_message.outputs.value }}`})
              });
              return await res.json();
            }

            webhook();
