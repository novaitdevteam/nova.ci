name: CI Build NTK on Push
on:
  workflow_call:
    inputs:
      runner_labels:
        required: false
        type: string
      build_target:
        required: false
        type: string
        default: ""
      trivy_severity:
        required: false
        type: string
        default: "CRITICAL,HIGH"
      trivy_mode:
        required: false
        type: string
        # warn-only: always succeed, report only.
        # fail-on-critical: fail when CRITICAL found.
        # fail-on-high: fail when CRITICAL or HIGH found.
        default: "warn-only"

jobs:
  linter:
    name: Linter
    runs-on: ${{ inputs.runner_labels  || 'self-hosted' }}
    environment: ${{ inputs.environment }}
    outputs:
      LINTER_CHECK: ${{ steps.linter_res.outputs.LINTER_CHECK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve lint plan
        id: lint_plan
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REF_NAME: ${{ inputs.build_target || github.ref_name }}
        run: |
          set -euo pipefail

          set_output() {
            local key="$1"
            shift || true
            {
              echo "${key}<<EOF"
              printf '%s\n' "$@"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          }

          strategy="other"
          set_output bootstrap_command ""
          set_output install_command ""
          set_output lint_command ""
          set_output node_options ""
          set_output node_cache ""
          set_output cache_dependency_path ""

          case "$REPO_NAME" in
            novatalks.core)
              strategy="novatalks.core"
              set_output install_command "npm ci"
              set_output node_options "--max-old-space-size=4096"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              case "$REF_NAME" in
                build-engine)
                  set_output lint_command "npx eslint apps/engine libs/common libs/database --ext .ts"
                  ;;
                build-reporting)
                  set_output lint_command "npx eslint apps/reporting libs/common libs/database --ext .ts"
                  ;;
                *)
                  set_output lint_command "npm run lint"
                  ;;
              esac
              ;;
            novatalks.ui)
              strategy="novatalks.ui"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npx eslint --ext .js,.vue --ignore-path .eslintignore src"
              ;;
            novatalks.dialer)
              strategy="novatalks.dialer"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npx eslint \"{src,apps,libs,test}/**/*.ts\""
              ;;
            nova.chatsconnector.whatsapp-client-api)
              strategy="nova.chatsconnector.whatsapp-client-api"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npm run lint"
              ;;
            nova.chatsconnector.telegram-client-api)
              strategy="nova.chatsconnector.telegram-client-api"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npm run lint"
              ;;
            nova.botflow)
              strategy="nova.botflow"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npm run lint"
              ;;
            novatalks.uspacy.connector)
              strategy="novatalks.uspacy.connector"
              set_output install_command "npm install"
              set_output lint_command "npm run eslint"
              ;;
            *)
              strategy="other"
              set_output bootstrap_command "npm install -g yarn"
              set_output install_command "yarn add eslint-plugin-security
          yarn add @typescript-eslint/eslint-plugin"
              set_output lint_command "npx eslint --ext .js,.vue,.ts . --quiet"
              ;;
          esac

          set_output strategy "$strategy"
          echo "Selected lint strategy: $strategy"

      - name: 💿 Setup Node.js with npm cache
        if: ${{ steps.lint_plan.outputs.node_cache == 'npm' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ steps.lint_plan.outputs.cache_dependency_path }}

      - name: 💿 Setup Node.js
        if: ${{ steps.lint_plan.outputs.node_cache != 'npm' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Prepare lint toolchain
        if: ${{ steps.lint_plan.outputs.bootstrap_command != '' }}
        run: |
          ${{ steps.lint_plan.outputs.bootstrap_command }}

      - name: Install deps for lint
        if: ${{ steps.lint_plan.outputs.install_command != '' }}
        run: |
          ${{ steps.lint_plan.outputs.install_command }}

      - name: Run lint
        id: linter
        if: ${{ steps.lint_plan.outputs.lint_command != '' }}
        env:
          NODE_OPTIONS: ${{ steps.lint_plan.outputs.node_options }}
        run: |
          ${{ steps.lint_plan.outputs.lint_command }}

      # ======== end ========
      - name: End Linter Step
        if: always()
        id: linter_res
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "LINTER_CHECK=✅" | tee -a "$GITHUB_OUTPUT"
          else
            echo "LINTER_CHECK=❌" | tee -a "$GITHUB_OUTPUT"
          fi

  unit-test:
    name: Unit Tests
    runs-on: ${{ inputs.runner_labels  || 'self-hosted' }}
    environment: ${{ inputs.environment }}
    outputs:
      UNIT_CHECK: ${{ steps.unit_res.outputs.UNIT_CHECK }}
    steps:
      - name: Checkout
        # Check out the commit SHA, not the trigger ref: a tag-triggered build deletes
        # the tag in build-image, which runs in parallel with this gate.
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Resolve test plan
        id: test_plan
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          BUILD_TARGET: ${{ inputs.build_target }}
        run: |
          set -euo pipefail

          set_output() {
            local key="$1"
            shift || true
            {
              echo "${key}<<EOF"
              printf '%s\n' "$@"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          }

          set_output install_command ""
          set_output unit_test_command ""
          set_output node_options ""
          set_output node_cache ""
          set_output cache_dependency_path ""

          selected_unit_cmd=""
          case "$REPO_NAME" in
            novatalks.core)
              set_output install_command "npm ci"
              set_output node_options "--max-old-space-size=4096"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              # Unit tests are not build-target specific. In the core PR matrix (build-engine + build-reporting)
              # run unit only once: skip on the build-reporting leg so it is not executed twice.
              if [[ "$BUILD_TARGET" != "build-reporting" ]]; then
                set_output unit_test_command "npm run test:unit"
                selected_unit_cmd="npm run test:unit"
              fi
              ;;
            *) ;;  # other repos: no unit gate (no-op success)
          esac

          echo "Selected unit test command: ${selected_unit_cmd:-(none)}"

      - name: 💿 Setup Node.js with npm cache
        if: ${{ steps.test_plan.outputs.node_cache == 'npm' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ steps.test_plan.outputs.cache_dependency_path }}

      - name: 💿 Setup Node.js
        if: ${{ steps.test_plan.outputs.node_cache != 'npm' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install deps for unit tests
        if: ${{ steps.test_plan.outputs.unit_test_command != '' && steps.test_plan.outputs.install_command != '' }}
        run: |
          ${{ steps.test_plan.outputs.install_command }}

      - name: Run unit tests
        id: unit
        if: ${{ steps.test_plan.outputs.unit_test_command != '' }}
        env:
          NODE_OPTIONS: ${{ steps.test_plan.outputs.node_options }}
        run: |
          ${{ steps.test_plan.outputs.unit_test_command }}

      # ======== end ========
      - name: End Unit Step
        if: always()
        id: unit_res
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "UNIT_CHECK=✅" | tee -a "$GITHUB_OUTPUT"
          else
            echo "UNIT_CHECK=❌" | tee -a "$GITHUB_OUTPUT"
          fi

  build-image:
    name: Build Image
    runs-on: ${{ inputs.runner_labels  || 'self-hosted' }}
    environment: ${{ inputs.environment }}
    # permissions:
    #   contents: read
    #   packages: write
    if: ${{ !cancelled() && github.event_name != 'pull_request' && needs.unit-test.result == 'success' }}
    needs: [linter, unit-test]
    outputs:
      REP_NAME: ${{ steps.prep.outputs.REP_NAME }}
      SHORT_SHA: ${{ steps.prep.outputs.SHORT_SHA }}
      SHORT_REF_NAME: ${{ steps.prep.outputs.SHORT_REF_NAME }}
      RELEASE: ${{ steps.prep.outputs.RELEASE }}
      END_STEP_JOB_ID: ${{ steps.end_step.outputs.END_STEP_JOB_ID }}
      IMAGE_SUFFIX: ${{ steps.set_dockerfile.outputs.IMAGE_SUFFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Docker
        uses: novaitdevteam/nova.ci/.github/actions/install-docker@main
          
      - name: Prepare Vars
        id: prep
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.event.base_ref }}
        run: |
          rep_name="$(echo "${GITHUB_REPOSITORY}" | cut -d "/" -f2)"
          short_sha="$(echo "${GITHUB_SHA}" | cut -c1-8)"
          release="$(date +'%Y_R%q')"

          if [[ -n "$HEAD_REF" ]]; then
            short_ref_name="$HEAD_REF"
          elif [[ "$REF_TYPE" == "branch" ]]; then
            short_ref_name="$REF_NAME"
          else
            short_ref_name="${BASE_REF#refs/heads/}"
          fi

          short_ref_name="$(printf '%s' "$short_ref_name" | sed 's#[^A-Za-z0-9_.-]#-#g')"

          echo "REP_NAME=${rep_name}" | tee -a $GITHUB_ENV $GITHUB_OUTPUT
          echo "SHORT_SHA=${short_sha}" | tee -a $GITHUB_ENV $GITHUB_OUTPUT
          echo "RELEASE=${release}" | tee -a $GITHUB_ENV $GITHUB_OUTPUT
          echo "SHORT_REF_NAME=${short_ref_name}" | tee -a $GITHUB_ENV $GITHUB_OUTPUT

      - name: Delete Tag
        if: ${{ github.ref_type == 'tag' && inputs.build_target == '' }}
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ github.ref_name }} # tag name to delete
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              core.info(`Deleted tag ${tag}`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                core.warning(`Tag ${tag} not found, skipping deletion.`);
              } else {
                throw error;
              }
            }

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          #username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub Container Registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.CR_DH_USERNAME }}
          password: ${{ secrets.CR_DH_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug
          driver-opts: network=host
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
            [grpc]
              max-recv-msg-size = 104857600
              max-send-msg-size = 104857600

      - name: Set Dockerfile path and image suffix
        id: set_dockerfile
        env:
          BUILD_TARGET: ${{ inputs.build_target || github.ref_name }}
        run: |
          if [[ "$BUILD_TARGET" == "build-engine" ]]; then
            echo "DOCKERFILE_PATH=./docker/engine.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_engine" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_engine" >> $GITHUB_OUTPUT
          elif [[ "$BUILD_TARGET" == "build-reporting" ]]; then
            echo "DOCKERFILE_PATH=./docker/reporting.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_reporting" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_reporting" >> $GITHUB_OUTPUT
          elif [[ "$BUILD_TARGET" == "build-restore-historical" ]]; then
            echo "DOCKERFILE_PATH=./docker/restore-historical.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_restore-historical" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_restore-historical" >> $GITHUB_OUTPUT
          elif [[ "$BUILD_TARGET" == "build-message-source-id" ]]; then
            echo "DOCKERFILE_PATH=./docker/message-source-id.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_migrate-message-source-id" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_migrate-message-source-id" >> $GITHUB_OUTPUT
          else
            echo "DOCKERFILE_PATH=./docker/server.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=" >> $GITHUB_OUTPUT
          fi

      - name: Resolve Docker cache policy
        id: cache_policy
        env:
          REPO_NAME: ${{ env.REP_NAME }}
          IMAGE_SUFFIX: ${{ env.IMAGE_SUFFIX }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.event.base_ref }}
        run: |
          set -euo pipefail

          set_output() {
            local key="$1"
            shift || true
            {
              echo "${key}<<EOF"
              printf '%s\n' "$@"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          }

          cache_ref="type=registry,ref=ghcr.io/${{ github.repository_owner }}/${REPO_NAME}:buildcache${IMAGE_SUFFIX}"
          source_branch="$REF_NAME"

          if [[ "$REF_TYPE" != "branch" && -n "$BASE_REF" ]]; then
            source_branch="${BASE_REF#refs/heads/}"
          fi

          cache_to="${cache_ref},mode=max"
          case "$source_branch" in
            master|development|main)
              ;;
            *)
              cache_to=""
              ;;
          esac

          set_output source_branch "$source_branch"
          set_output cache_from "$cache_ref"
          set_output cache_to "$cache_to"

          echo "Selected cache source branch: $source_branch"
          if [[ -n "$cache_to" ]]; then
            echo "Cache export enabled."
          else
            echo "Cache export disabled for this build."
          fi

      - name: Build and push
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
          CACHE_TO: ${{ steps.cache_policy.outputs.cache_to }}
          CACHE_FROM: ${{ steps.cache_policy.outputs.cache_from }}
          TAG_DH: ${{ secrets.CR_DH_USERNAME }}/${{ env.REP_NAME }}:${{ env.RELEASE }}_${{ env.SHORT_REF_NAME }}${{ env.IMAGE_SUFFIX }}_${{ env.SHORT_SHA }}
          TAG_GHCR: ghcr.io/${{ github.repository_owner }}/${{ env.REP_NAME }}:${{ env.RELEASE }}_${{ env.SHORT_REF_NAME }}${{ env.IMAGE_SUFFIX }}_${{ env.SHORT_SHA }}
        run: |
          set -euo pipefail

          build_args=(
            --builder "${{ steps.buildx.outputs.name }}"
            --file "${{ env.DOCKERFILE_PATH }}"
            --target main
            --pull
            --push
            --cache-from "$CACHE_FROM"
            --tag "$TAG_DH"
            --tag "$TAG_GHCR"
            .
          )

          if [[ -n "$CACHE_TO" ]]; then
            build_args+=(--cache-to "$CACHE_TO")
          fi

          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            docker buildx build "${build_args[@]}" && break
            echo "Attempt $attempt failed."
            [ "$attempt" -lt 3 ] && sleep 20
          done

      - name: Add latest tag on master DOCKER
        if: ${{ contains( github.event.base_ref, 'master' ) }}
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.CR_DH_USERNAME }}/${{ env.REP_NAME }}:latest \
            ${{ secrets.CR_DH_USERNAME }}/${{ env.REP_NAME }}:${{ env.RELEASE }}_${{ env.SHORT_REF_NAME }}${{ env.IMAGE_SUFFIX }}_${{ env.SHORT_SHA }}

      - name: Add latest tag on master GHCR
        if: ${{ contains( github.event.base_ref, 'master' ) }}
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/${{ env.REP_NAME }}:latest \
            ghcr.io/${{ github.repository_owner }}/${{ env.REP_NAME }}:${{ env.RELEASE }}_${{ env.SHORT_REF_NAME }}${{ env.IMAGE_SUFFIX }}_${{ env.SHORT_SHA }}

      - name: End Step On Failure
        if: failure()
        id: end_step
        run: echo "END_STEP_JOB_ID=`echo ${{ github.run_id }}`" | tee -a $GITHUB_OUTPUT

  trivy-scan:
    name: Trivy Scan
    runs-on: ${{ inputs.runner_labels  || 'self-hosted' }}
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
    # Lint-only for PRs: never scan on pull_request. Only scan a successfully built image.
    if: ${{ always() && github.event_name != 'pull_request' && needs.build-image.result == 'success' }}
    needs: [build-image]
    outputs:
      SCANNED: ${{ steps.scan_policy.outputs.should_scan }}
      MODE: ${{ steps.scan_policy.outputs.mode }}
      CRITICAL: ${{ steps.report.outputs.critical }}
      HIGH: ${{ steps.report.outputs.high }}
      REPORT_URL: ${{ steps.report.outputs.report_url }}
    env:
      TRIVY_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ needs.build-image.outputs.REP_NAME }}:${{ needs.build-image.outputs.RELEASE }}_${{ needs.build-image.outputs.SHORT_REF_NAME }}${{ needs.build-image.outputs.IMAGE_SUFFIX }}_${{ needs.build-image.outputs.SHORT_SHA }}
      TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
      REPORT_FILE: trivy-${{ needs.build-image.outputs.REP_NAME }}-${{ needs.build-image.outputs.SHORT_REF_NAME }}${{ needs.build-image.outputs.IMAGE_SUFFIX }}-${{ needs.build-image.outputs.SHORT_SHA }}.report
      RELEASE_TAG: TRIVY.SCAN_${{ needs.build-image.outputs.RELEASE }}_${{ needs.build-image.outputs.SHORT_REF_NAME }}${{ needs.build-image.outputs.IMAGE_SUFFIX }}_${{ needs.build-image.outputs.SHORT_SHA }}
    steps:
      - name: Resolve scan policy
        id: scan_policy
        env:
          SOURCE_BRANCH: ${{ needs.build-image.outputs.SHORT_REF_NAME }}
          REF_NAME: ${{ github.ref_name }}
          SCAN_SEVERITY: ${{ inputs.trivy_severity }}
          SCAN_MODE: ${{ inputs.trivy_mode }}
        run: |
          set -euo pipefail

          severity="${SCAN_SEVERITY:-CRITICAL,HIGH}"
          mode="${SCAN_MODE:-warn-only}"

          # Auto-scan protected source branches; otherwise require a strict scan tag
          # (the ref name must start with "scan", e.g. "scan" or "scan-NC2-1234").
          should_scan="false"
          reason=""
          case "$SOURCE_BRANCH" in
            main|master|development)
              should_scan="true"
              reason="protected source branch ($SOURCE_BRANCH)"
              ;;
          esac

          if [[ "$should_scan" != "true" && "$REF_NAME" == scan* ]]; then
            should_scan="true"
            reason="explicit scan tag ($REF_NAME)"
          fi

          # Bucket the Trivy DB cache into 5-hour windows so a stale DB lives at most ~5h.
          cache_bucket="$(( $(date +%s) / 18000 ))"

          echo "should_scan=$should_scan" | tee -a "$GITHUB_OUTPUT"
          echo "severity=$severity" | tee -a "$GITHUB_OUTPUT"
          echo "mode=$mode" | tee -a "$GITHUB_OUTPUT"
          echo "cache_bucket=$cache_bucket" | tee -a "$GITHUB_OUTPUT"

          if [[ "$should_scan" == "true" ]]; then
            echo "Trivy scan enabled: $reason"
          else
            echo "Trivy scan skipped: source branch '$SOURCE_BRANCH' is not main/master/development and the trigger ref '$REF_NAME' does not start with 'scan'."
          fi

      - name: Install Docker
        if: ${{ steps.scan_policy.outputs.should_scan == 'true' }}
        uses: novaitdevteam/nova.ci/.github/actions/install-docker@main

      - name: Login to GitHub Container Registry
        if: ${{ steps.scan_policy.outputs.should_scan == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built image
        if: ${{ steps.scan_policy.outputs.should_scan == 'true' }}
        run: docker pull --platform linux/amd64 "$TRIVY_IMAGE"

      # 5-hour cache window: a new key every 5h forces a fresh Trivy DB at least that often.
      - name: Cache Trivy databases (5h window)
        if: ${{ steps.scan_policy.outputs.should_scan == 'true' }}
        uses: actions/cache@v4
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: trivy-db-5h-${{ steps.scan_policy.outputs.cache_bucket }}
          restore-keys: |
            trivy-db-5h-

      # OS-package vulnerabilities. First call also installs Trivy and downloads the
      # vulnerability + Java DBs (the action manages both, so no manual two-step download).
      - name: Trivy scan (OS packages)
        if: ${{ steps.scan_policy.outputs.should_scan == 'true' }}
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PKG_TYPES: os
        with:
          scan-type: image
          image-ref: ${{ env.TRIVY_IMAGE }}
          format: table
          output: trivy-os.txt
          severity: ${{ steps.scan_policy.outputs.severity }}
          scanners: vuln
          cache: "false"
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}
          hide-progress: "true"

      # Application/library vulnerabilities (Node.js node-pkg, etc).
      - name: Trivy scan (libraries)
        if: ${{ steps.scan_policy.outputs.should_scan == 'true' }}
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PKG_TYPES: library
        with:
          scan-type: image
          image-ref: ${{ env.TRIVY_IMAGE }}
          format: table
          output: trivy-library.txt
          severity: ${{ steps.scan_policy.outputs.severity }}
          scanners: vuln
          cache: "false"
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}
          hide-progress: "true"
          skip-setup-trivy: "true"

      # Machine-readable pass used only to count findings for the summary and fail policy.
      - name: Trivy scan (JSON for counts)
        if: ${{ steps.scan_policy.outputs.should_scan == 'true' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.TRIVY_IMAGE }}
          format: json
          output: trivy-counts.json
          severity: ${{ steps.scan_policy.outputs.severity }}
          scanners: vuln
          cache: "false"
          cache-dir: ${{ env.TRIVY_CACHE_DIR }}
          hide-progress: "true"
          skip-setup-trivy: "true"

      - name: Assemble report
        id: report
        if: ${{ steps.scan_policy.outputs.should_scan == 'true' }}
        run: |
          set -euo pipefail

          {
            echo "=============================="
            echo " IMAGE: $TRIVY_IMAGE"
            echo "=============================="
            echo ""
            echo "=== OS Vulnerabilities ==="
            cat trivy-os.txt
            echo ""
            echo "=== Node.js Vulnerabilities ==="
            sed -n '/^Node.js (node-pkg)/,$p' trivy-library.txt
          } > "$REPORT_FILE"

          # grep exits non-zero when there are no matches (clean image); under pipefail that
          # would kill the step, so swallow grep's status before counting -> 0 findings = "0".
          crit=$({ grep -o '"Severity":[[:space:]]*"CRITICAL"' trivy-counts.json || true; } | wc -l | tr -d ' ')
          high=$({ grep -o '"Severity":[[:space:]]*"HIGH"' trivy-counts.json || true; } | wc -l | tr -d ' ')
          echo "critical=$crit" | tee -a "$GITHUB_OUTPUT"
          echo "high=$high" | tee -a "$GITHUB_OUTPUT"
          echo "report_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${REPORT_FILE}" | tee -a "$GITHUB_OUTPUT"

          echo "Report written to $REPORT_FILE"

      - name: Upload report artifact
        if: ${{ always() && steps.scan_policy.outputs.should_scan == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPORT_FILE }}
          path: ${{ env.REPORT_FILE }}
          if-no-files-found: warn

      # Publish the .report as a downloadable release asset, like the chat widget build.
      - name: Publish report release
        if: ${{ always() && steps.scan_policy.outputs.should_scan == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: Automated Trivy scan report for ${{ env.TRIVY_IMAGE }}
          draft: false
          prerelease: true
          files: ${{ env.REPORT_FILE }}

      - name: Publish scan summary and apply policy
        if: ${{ always() && steps.scan_policy.outputs.should_scan == 'true' }}
        env:
          CRIT: ${{ steps.report.outputs.critical }}
          HIGH: ${{ steps.report.outputs.high }}
          MODE: ${{ steps.scan_policy.outputs.mode }}
          SEVERITY: ${{ steps.scan_policy.outputs.severity }}
          DOWNLOAD_URL: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/${{ env.REPORT_FILE }}
        run: |
          set -euo pipefail

          crit="${CRIT:-0}"
          high="${HIGH:-0}"

          # Pick a colored GitHub-flavored alert banner by worst severity found.
          if [[ "$crit" -gt 0 ]]; then
            alert="CAUTION"
            headline="🚨 $crit CRITICAL and $high HIGH vulnerabilities found — review the report."
          elif [[ "$high" -gt 0 ]]; then
            alert="WARNING"
            headline="⚠️ $high HIGH vulnerabilities found — review the report."
          else
            alert="NOTE"
            headline="✅ No CRITICAL or HIGH vulnerabilities found."
          fi

          {
            echo "## 🔐 Trivy image scan"
            echo ""
            echo "> [!${alert}]"
            echo "> ${headline}"
            echo ""
            echo "- Image: \`$TRIVY_IMAGE\`"
            echo "- Severities scanned: \`$SEVERITY\`"
            echo "- Policy mode: \`$MODE\`"
            echo "- Report: [\`$REPORT_FILE\`]($DOWNLOAD_URL)"
            echo ""
            echo "| Severity | Count |"
            echo "| --- | --- |"
            echo "| CRITICAL | $crit |"
            echo "| HIGH | $high |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Trivy results — CRITICAL: $crit, HIGH: $high (mode: $MODE)"

          case "$MODE" in
            fail-on-critical)
              if [[ "$crit" -gt 0 ]]; then
                echo "::error::Trivy found $crit CRITICAL vulnerabilities; failing per '$MODE' policy."
                exit 1
              fi
              ;;
            fail-on-high)
              if [[ "$crit" -gt 0 || "$high" -gt 0 ]]; then
                echo "::error::Trivy found $crit CRITICAL and $high HIGH vulnerabilities; failing per '$MODE' policy."
                exit 1
              fi
              ;;
          esac

          if [[ "$crit" -gt 0 || "$high" -gt 0 ]]; then
            echo "::warning::Trivy found $crit CRITICAL and $high HIGH vulnerabilities. See $REPORT_FILE."
          fi

  notify-telegram:
    name: Notifier
    runs-on: ${{ inputs.runner_labels  || 'self-hosted' }}
    if: ${{ always() && github.event_name != 'pull_request' }}
    needs: [build-image, linter, trivy-scan, unit-test]
    steps:
      - name: Compose Trivy line
        id: trivy_line
        env:
          RESULT: ${{ needs.trivy-scan.result }}
          SCANNED: ${{ needs.trivy-scan.outputs.SCANNED }}
          MODE: ${{ needs.trivy-scan.outputs.MODE }}
          CRIT: ${{ needs.trivy-scan.outputs.CRITICAL }}
          HIGH: ${{ needs.trivy-scan.outputs.HIGH }}
          URL: ${{ needs.trivy-scan.outputs.REPORT_URL }}
        run: |
          set -euo pipefail

          if [[ "$SCANNED" == "true" ]]; then
            crit="${CRIT:-0}"
            high="${HIGH:-0}"
            # Style by worst severity. Build stays green (warn-only); this only signals.
            if [[ "$RESULT" == "failure" ]]; then
              head="🔐 Trivy Scan: ❌ FAILED  (policy: ${MODE})"
            elif [[ "$crit" -gt 0 ]]; then
              head="🔐 Trivy Scan: 🔴 CRITICAL found!"
            elif [[ "$high" -gt 0 ]]; then
              head="🔐 Trivy Scan: 🟠 HIGH found"
            else
              head="🔐 Trivy Scan: 🟢 clean"
            fi
            line="${head}"
            line="${line}"$'\n'"   CRITICAL: ${crit} | HIGH: ${high}"
            line="${line}"$'\n'"   📄 Report: ${URL}"
          else
            line="🔐 Trivy Scan: ⏭️ skipped (no scan trigger)"
          fi

          {
            echo "value<<EOF"
            printf '%s\n' "$line"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set Telegram Message
        uses: novaitdevteam/nova.ci/.github/actions/action-cond@main
        id: telegram_message
        with:
          cond: ${{ contains(join(needs.build-image.result, ','), 'success') }}
          if_true: |
            👷 ${{ github.actor }} created deploy tag.

            Image building has been completed ✅

            ▶️ GitHub Public Registry: ghcr.io/${{ github.repository_owner }}/${{ needs.build-image.outputs.REP_NAME }}
            🔗 docker pull ghcr.io/${{ github.repository_owner }}/${{ needs.build-image.outputs.REP_NAME }}:${{ needs.build-image.outputs.RELEASE }}_${{ needs.build-image.outputs.SHORT_REF_NAME }}${{ needs.build-image.outputs.IMAGE_SUFFIX }}_${{ needs.build-image.outputs.SHORT_SHA }}

            ▶️ Docker Private Registry: ${{ secrets.CR_DH_USERNAME }}/${{ needs.build-image.outputs.REP_NAME }}
            🔗 docker pull docker.io/${{ secrets.CR_DH_USERNAME }}/${{ needs.build-image.outputs.REP_NAME }}:${{ needs.build-image.outputs.RELEASE }}_${{ needs.build-image.outputs.SHORT_REF_NAME }}${{ needs.build-image.outputs.IMAGE_SUFFIX }}_${{ needs.build-image.outputs.SHORT_SHA }}

            🔵 Image Name: ${{ needs.build-image.outputs.RELEASE }}_${{ needs.build-image.outputs.SHORT_REF_NAME }}${{ needs.build-image.outputs.IMAGE_SUFFIX }}_${{ needs.build-image.outputs.SHORT_SHA }}

            ESLinter Check Status: ${{ needs.linter.outputs.LINTER_CHECK }}
            Unit Tests Status: ${{ needs.unit-test.outputs.UNIT_CHECK }}

            ${{ steps.trivy_line.outputs.value }}

            Repository: ${{ github.repository }}
            See changes: https://github.com/${{ github.repository }}/commit/${{github.sha}}
          if_false: |
            👷 ${{ github.actor }} created deploy tag.

            ❌Build Failed

            ESLinter Check Status: ${{ needs.linter.outputs.LINTER_CHECK }}
            Unit Tests Status: ${{ needs.unit-test.outputs.UNIT_CHECK }}

            🔗 See Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ needs.build-image.outputs.END_STEP_JOB_ID}}
            Repository: ${{ github.repository }}

      - name: Send to Telegram
        uses: actions/github-script@v8
        env:
          TELEGRAM_TO: ${{ secrets.TG_NOTIFICATION_BOT_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TG_NOTIFICATION_BOT_TOKEN }}
          TELEGRAM_MESSAGE: ${{ steps.telegram_message.outputs.value }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const params = new URLSearchParams({
              chat_id: process.env.TELEGRAM_TO,
              text: process.env.TELEGRAM_MESSAGE,
            });
            const response = await fetch(`https://api.telegram.org/bot${process.env.TELEGRAM_TOKEN}/sendMessage`, {
              method: "POST",
              headers: {"Content-Type": "application/x-www-form-urlencoded"},
              body: params,
            });
            if (!response.ok) {
              throw new Error(`Telegram sendMessage failed: ${response.status} ${await response.text()}`);
            }

      - name: Send Message To GChat
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          debug: "true"
          script: |
            async function webhook() {
              const url = "${{ secrets.GC_NOTIFICATION_WEBHOOK }}"
              const res = await fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json; charset=UTF-8"},
                body: JSON.stringify({text: `${{ steps.telegram_message.outputs.value }}`})
              });
              return await res.json();
            }

            webhook();
